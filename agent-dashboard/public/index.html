<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent SDLC Index</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header">
        <div class="site-brand">
          <span class="hero-label">Agent SDLC</span>
        </div>
        <div class="site-actions">
          <span id="load-indicator" hidden><span class="loading-dot"></span>Loading</span>
          <span id="error-banner" hidden></span>
          <strong id="indicator-text">Idle</strong>
        </div>
      </header>

      <section class="hero">
        <h1 id="header-title">Repository Index</h1>
        <p id="hero-subtitle" class="hero-subtitle" hidden></p>
        <div class="hero-controls">
          <form id="load-form" class="toolbar-form">
            <label class="field-group field-group-wide">
              <span>Repository</span>
              <input id="repo-path" type="text" placeholder="/path/to/repository" />
            </label>
            <button type="submit">Load</button>
          </form>
          <div class="toolbar-search">
            <label class="field-group field-group-tight">
              <span>Scope</span>
              <select id="search-scope">
                <option value="all">All</option>
                <option value="context">Context</option>
              </select>
            </label>
            <label class="field-group field-group-wide">
              <span>Search</span>
              <input id="search-input" type="text" placeholder="Search artifacts..." />
            </label>
          </div>
        </div>
      </section>

      <section class="layout">
        <aside id="sidebar" class="side-column" data-expanded="true">
          <div class="sidebar-head">
            <strong id="sidebar-project-name">Agent SDLC</strong>
            <button id="sidebar-toggle" type="button" title="Toggle sidebar">Hide</button>
          </div>
          <nav id="sidebar-nav" class="sidebar-nav"></nav>
        </aside>

        <section id="main" class="main-column">
          <div id="empty-state" class="empty-state">
            <div class="empty-state-inner">
              <h2>No repository loaded</h2>
              <p>Enter the path to a repo with an <code>.agent-sdlc</code> folder above, then press Load.</p>
            </div>
          </div>

          <section id="view-home" hidden class="view-stack">
            <div class="section-head">
              <h2>Overview</h2>
            </div>
            <div id="home-cards" class="home-grid"></div>
          </section>

          <section id="view-context" hidden class="view-stack">
            <div class="section-head">
              <h2>Project Context</h2>
            </div>
            <div id="context-grid" class="context-grid"></div>
          </section>

          <section id="view-table" hidden class="view-stack">
            <div id="stat-cards" class="stat-grid"></div>
            <div id="charts-section" hidden></div>
            <div class="index-card table-shell">
              <div class="entry-meta">
                <div>
                  <span class="meta-label">Artifacts</span>
                  <h3 id="table-title">Artifacts</h3>
                </div>
                <div class="table-head-meta">
                  <div id="type-filter" hidden class="filter-pills"></div>
                  <span id="table-count"></span>
                </div>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr id="table-head"></tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
            </div>
          </section>
        </section>
      </section>

      <div id="detail-panel" hidden class="detail-panel">
        <div id="detail-backdrop" class="detail-backdrop"></div>
        <section class="detail-sheet">
          <header class="detail-header">
            <div class="detail-header-main">
              <button id="detail-back" hidden type="button">Back</button>
              <div>
                <p class="meta-label" id="detail-kind-label">Detail</p>
                <h2 id="detail-title"></h2>
                <div id="detail-meta" class="detail-meta"></div>
              </div>
            </div>
            <div>
              <button id="detail-close" type="button">Close</button>
            </div>
          </header>
          <div id="detail-body" class="detail-body"></div>
        </section>
      </div>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
