apiVersion: apps/v1
kind: Deployment
metadata:
  name:  {{ .Release.Name }}-neo4j
  labels:
    app: {{ .Release.Name }}-neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-neo4j
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-neo4j
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - hh-rke-wp-webadmin-47-worker-2.caas.ebi.ac.uk
                      - hx-rke-wp-webadmin-40-worker-2.caas.ebi.ac.uk
      volumes:
        - name: {{ .Release.Name }}-neo4j-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-neo4j-pvc
        - name: {{ .Release.Name }}-import
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-import-pvc
      containers:
        - name: neo4j
          image: ghcr.io/ebispot/ols4-neo4j:2025.03.0-community
          volumeMounts:
            - mountPath: "/data"
              name: {{ .Release.Name }}-neo4j-storage
            - mountPath: "/data_import"
              name: {{ .Release.Name }}-import
          command: ["/bin/bash", "-c"]
          args: ["rm -rf /data/* && cat /data_import/neo4j.tgz | tar -xz -C /data/ && tini -g -- /startup/docker-entrypoint.sh neo4j"]
          resources:
            requests:
              memory: 15Gi
              cpu: 3
            limits:
              memory: 20Gi
              cpu: 4
          env:
            - name: NEO4J_server_memory_heap_initial__size
              value: 15000m
            - name: NEO4J_server_memory_heap_max__size
              value: 15000m
            - name: NEO4J_AUTH
              value: none
            - name: JAVA_OPTS
              value: --add-modules jdk.incubator.vector --add-opens java.base/java.util=ALL-UNNAMED
          ports:
            - containerPort: 7474
            - containerPort: 7687
