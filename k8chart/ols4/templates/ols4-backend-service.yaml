apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}-backend
spec:
  type: NodePort
  ports:
  - name: "application"
    port: 8080
    #https://kubernetes.io/docs/concepts/services-networking/service/#nodeport-custom-port
    nodePort: 30009
  selector:
    app: {{ .Release.Name }}-backend
