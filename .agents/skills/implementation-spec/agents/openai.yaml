interface:
  display_name: "Implementation Spec"
  short_description: "Draft, review, and revise implementation spec files"
  default_prompt: "Use $implementation-spec to draft, review, or revise an implementation spec for junior developers. Support both legacy `impl-spec-*.md` files and repo-managed ID-based spec files. When `./.agent-sdlc/config.yaml` exists at repo root, use it to determine the implementation-spec storage directory, `name_pattern`, and `.lock`-based ID allocation. Open or create the artifact `.lock`, acquire an exclusive lock before reading it, never pre-read it, and while still holding the lock compute the next ID, verify the rendered target filename is unused, write the updated last-allocated value back, flush it, and only then release the lock. `name_pattern` must use brace-style placeholders only, with required `seq` and optional `version`; reject mixed forms such as `{%03d}`. Prefer patterns such as `IML-{seq:05d}.md` or `IML-{seq:05d}-v{version}.md`. When `version` is used, it must resolve to `N.N`, so the rendered filename looks like `IML-00032-v1.0.md`, not `IML-00032-v01.00.md`. In a grouped multi-file spec set, allocate one top-level overview file from `name_pattern`, do not create `index.md`, create a sibling folder named after the top-level file stem, and store child specs there with meaningful names such as `common.md`, `control-panel-api.md`, `agent-harness.md`, or `design.md`. Child specs do not consume additional `.lock` IDs. The top-level frontmatter `id` must equal the filename stem, and child-spec `id` values should derive from the top-level `id` plus the child file stem. Use split per-module specs when needed, keep API and schema details explicit, and use the shared inline feedback format for both reviewer findings and author responses: `> [ ] [agent-name (Codex: <session-id>)] [<YYYY-MM-DDTHH:MM:SSZ>]: ...`. Preserve all prior review comments and author responses inline; never delete, rewrite, collapse, or move existing comment threads, and only change a reviewer checkbox from `[ ]` to `[x]` when the finding is fully addressed. For issues that need human attention, use `> [ ] [ESCALATE] [agent-name (Codex: <session-id>)] [<YYYY-MM-DDTHH:MM:SSZ>]: ...` and summarize only those items in `Escalated Items`."
