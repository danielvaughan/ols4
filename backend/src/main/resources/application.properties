
spring.aop.proxy-target-class=true

spring.jackson.serialization.INDENT_OUTPUT=true

springdoc.swagger-ui.path=/swagger-ui-ols4.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.layout=BaseLayout

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

server.error.whitelabel.enabled=false

# this is optional. This property will determine the size of result you get back from solr. By default its 1000 rows
ols.solr.max-rows=1000

spring.ai.mcp.server.sse-endpoint=/api/mcp/sse
spring.ai.mcp.server.sse-message-endpoint=/api/mcp/message