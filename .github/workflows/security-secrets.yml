name: Secret Detection

on:
  push:
    branches: [ "dev", "stable" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    # Run full scan weekly on Saturdays at 4 AM UTC
    - cron: '0 4 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  gitleaks-scan:
    name: Gitleaks Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: 'secret-detection'

  trufflehog-scan:
    name: TruffleHog Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  security-summary:
    name: Secret Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks-scan, trufflehog-scan]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Secret Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Secret scanning completed using:" >> $GITHUB_STEP_SUMMARY
          echo "- **Gitleaks**: Detects hardcoded secrets, API keys, and tokens" >> $GITHUB_STEP_SUMMARY
          echo "- **TruffleHog**: Verifies found secrets are valid" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Check the Security tab for detailed findings" >> $GITHUB_STEP_SUMMARY
          echo "- Rotate any exposed credentials immediately" >> $GITHUB_STEP_SUMMARY
          echo "- Use environment variables and GitHub Secrets for sensitive data" >> $GITHUB_STEP_SUMMARY
