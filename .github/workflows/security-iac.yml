name: IaC Security Scanning

on:
  push:
    branches: [ "dev", "stable" ]
    paths:
      - 'k8chart/**'
      - 'k8chart-dev/**'
      - '**/Dockerfile'
      - '**/*.yaml'
      - '**/*.yml'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'k8chart/**'
      - 'k8chart-dev/**'
      - '**/Dockerfile'
      - '**/*.yaml'
      - '**/*.yml'
  schedule:
    # Run weekly on Thursdays at 5 AM UTC
    - cron: '0 5 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-iac-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-iac-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'config'
          skip-dirs: 'frontend/node_modules'

      - name: Upload Trivy IaC results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-iac-results.sarif'
          category: 'iac-trivy'

      - name: Run Trivy IaC scanner (Table format)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          skip-dirs: 'frontend/node_modules'

  kics-scan:
    name: KICS Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KICS Scan
        uses: checkmarx/kics-github-action@v2.1.2
        with:
          path: '.'
          output_path: 'kics-results'
          platform_type: 'kubernetes,dockerfile'
          output_formats: 'json,sarif'
          exclude_paths: 'frontend/node_modules'
          fail_on: 'high,critical'
          enable_comments: true

      - name: Upload KICS results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'kics-results/results.sarif'
          category: 'iac-kics'

      - name: Upload KICS JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kics-report
          path: kics-results/results.json
          retention-days: 30

  checkov-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes,dockerfile
          output_format: sarif
          output_file_path: checkov-results.sarif
          skip_path: frontend/node_modules
          soft_fail: true

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'checkov-results.sarif'
          category: 'iac-checkov'

  dockerfile-lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint on backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          format: sarif
          output-file: hadolint-backend.sarif
          no-fail: true

      - name: Run Hadolint on frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          format: sarif
          output-file: hadolint-frontend.sarif
          no-fail: true

      - name: Run Hadolint on dataload Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dataload/Dockerfile
          format: sarif
          output-file: hadolint-dataload.sarif
          no-fail: true

      - name: Upload Hadolint results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./hadolint-*.sarif
          category: 'dockerfile-lint'

  kubernetes-validation:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests (k8chart)
        run: |
          find k8chart -name '*.yaml' -type f | while read file; do
            echo "Validating $file"
            kubeconform -strict -summary "$file" || true
          done

      - name: Validate Kubernetes manifests (k8chart-dev)
        run: |
          find k8chart-dev -name '*.yaml' -type f | while read file; do
            echo "Validating $file"
            kubeconform -strict -summary "$file" || true
          done

  iac-summary:
    name: IaC Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-iac-scan, kics-scan, checkov-scan, dockerfile-lint, kubernetes-validation]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Infrastructure as Code Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scanned Components:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Kubernetes manifests** (k8chart, k8chart-dev)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Dockerfiles** (backend, frontend, dataload)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Helm charts**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Tools Used:" >> $GITHUB_STEP_SUMMARY
          echo "- **Trivy**: Misconfigurations in K8s and Docker" >> $GITHUB_STEP_SUMMARY
          echo "- **KICS**: Security scanning for IaC" >> $GITHUB_STEP_SUMMARY
          echo "- **Checkov**: Policy-as-code validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Hadolint**: Dockerfile best practices" >> $GITHUB_STEP_SUMMARY
          echo "- **kubeconform**: Kubernetes schema validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Common Issues to Check:" >> $GITHUB_STEP_SUMMARY
          echo "- Resource limits and requests" >> $GITHUB_STEP_SUMMARY
          echo "- Security contexts and privileged containers" >> $GITHUB_STEP_SUMMARY
          echo "- Network policies" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets management" >> $GITHUB_STEP_SUMMARY
          echo "- Image pull policies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed findings in the **Security** tab." >> $GITHUB_STEP_SUMMARY
