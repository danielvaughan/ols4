name: Publish Docker Images

on:
  push:
    branches: [dev, stable, nextflow3]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'EBISPOT' }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [dataload, embed, backend, frontend, apitester4]
        include:
          - component: dataload
            context: .
            dockerfile: ./dataload/Dockerfile
            build-args: ""
          - component: embed
            context: ./dataload/embeddings
            dockerfile: ./dataload/embeddings/Dockerfile
            build-args: ""
          - component: backend
            context: .
            dockerfile: ./backend/Dockerfile
            build-args: ""
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build-args: ""
          - component: apitester4
            context: ./apitester4
            dockerfile: ./apitester4/Dockerfile
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/ebispot/ols4-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push ols4 ${{ matrix.component }} Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.component == 'embed' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ghcr.io/ebispot/ols4-${{ matrix.component }}:${{ github.sha }}
            ghcr.io/ebispot/ols4-${{ matrix.component }}:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
