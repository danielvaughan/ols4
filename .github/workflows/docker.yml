name: Build & publish ols4 images

on:
  push:
    branches: [ "dev", "stable" ]
  pull_request:
    branches: [ "dev" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    if: ${{ github.repository_owner == 'EBISPOT' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Log in to the Container registry
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ols4 dataload Docker image
        run: |
          docker build -t ghcr.io/ebispot/ols4-dataload:${{ github.sha }} -f ./dataload/Dockerfile .
          docker tag ghcr.io/ebispot/ols4-dataload:${{github.sha}} ghcr.io/ebispot/ols4-dataload:${{ github.head_ref || github.ref_name }}

      - name: Run Trivy scan on dataload image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ebispot/ols4-dataload:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-dataload.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results for dataload
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-dataload.sarif'
          category: 'trivy-dataload'

      - name: Push ols4 dataload Docker image
        run: |
          docker push --all-tags ghcr.io/ebispot/ols4-dataload

      - name: Build ols4 backend Docker image
        run: |
          docker build -t ghcr.io/ebispot/ols4-backend:${{ github.sha }} -f ./backend/Dockerfile .
          docker tag ghcr.io/ebispot/ols4-backend:${{github.sha}} ghcr.io/ebispot/ols4-backend:${{ github.head_ref || github.ref_name }}

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ebispot/ols4-backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results for backend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Push ols4 backend Docker image
        run: |
          docker push --all-tags ghcr.io/ebispot/ols4-backend

      - name: Build ols4 frontend Docker image
        run: |
          cd frontend
          docker build -t ghcr.io/ebispot/ols4-frontend:${{ github.sha }} .
          docker tag ghcr.io/ebispot/ols4-frontend:${{github.sha}} ghcr.io/ebispot/ols4-frontend:${{ github.head_ref || github.ref_name }}

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ebispot/ols4-frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results for frontend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

      - name: Push ols4 frontend Docker image
        run: |
          docker push --all-tags ghcr.io/ebispot/ols4-frontend

